<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⌨️ Afrim</title>
    <meta name="description" content="Afrim web interface." />
    <meta name="author" content="" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/bulmaswatch/sandstone/bulmaswatch.min.css"
    />
    <link
      href="https://unpkg.com/@fortawesome/fontawesome-free@5.13.0/css/all.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div>
      <nav class="navbar">
        <div class="container">
          <div class="navbar-brand">
            <a class="navbar-item"> ⌨️ Afrim </a>
            <span class="navbar-burger burger" data-target="navbarMenuHero8">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </div>
          <div id="navbarMenuHero8" class="navbar-menu">
            <div class="navbar-end">
              <div class="navbar-item has-dropdown is-hoverable">
                <a class="navbar-link"> Languages </a>
                <div class="navbar-dropdown is-boxed">
                  <div class="columns">
                    <div class="column">
                      <a
                        class="navbar-item"
                        id="amharic"
                        onclick="setLang('amharic')"
                      >
                        Amharic
                      </a>
                      <a
                        class="navbar-item"
                        id="geez"
                        onclick="setLang('geez')"
                      >
                        Geez
                      </a>
                    </div>
                    <div class="column">
                      <a
                        class="navbar-item"
                        id="clafrica"
                        onclick="setLang('clafrica')"
                      >
                        Clafrica
                      </a>
                      <a
                        class="navbar-item"
                        id="nufi"
                        onclick="setLang('nufi')"
                      >
                        Nufi
                      </a>
                    </div>
                  </div>
                </div>
              </div>
              <span class="navbar-item">
                <a
                  class="button is-primary is-inverted"
                  href="https://github.com/pythonbrad/afrim-js"
                >
                  <span class="icon">
                    <i class="fab fa-github"></i>
                  </span>
                  <span>Source Code</span>
                </a>
              </span>
            </div>
          </div>
        </div>
      </nav>
    </div>
    <!-- Hero content: will be in the middle -->
    <div class="hero">
      <div class="hero-body">
        <div class="container has-text-centered">
          <h1 class="title">Afrim</h1>
          <textarea
            id="textfield"
            class="textarea is-medium"
            style="height: 50vh"
            placeholder="You can begin to type here..."
          ></textarea>
        </div>
      </div>
      <!-- Hero footer: will stick at the bottom -->
      <div class="hero-foot">
        <nav class="footer">
          <div class="content has-text-centered">
            <div class="subtitle">
              <a href="https://github.com/pythonbrad/afrim">Afrim</a> by
              <a href="https://github.com/pythonbrad">@pythonbrad</a>.
            </div>
          </div>
        </nav>
      </div>
    </div>
    <div id="tooltip" class="dropdown" style="z-index: 999; position: absolute">
      <div class="dropdown-menu">
        <div class="dropdown-content">
          <a class="dropdown-item is-active" id="input"> Cursor </a>
          <div id="predicates">
            <a class="dropdown-item">{{ predicate }}</a>
          </div>
        </div>
      </div>
    </div>
    <script type="text/javascript">
      document.addEventListener("DOMContentLoaded", () => {
        // Get all "navbar-burger" elements
        const $navbarBurgers = Array.prototype.slice.call(
          document.querySelectorAll(".navbar-burger"),
          0,
        );
        // Add a click event on each of them
        $navbarBurgers.forEach((el) => {
          el.addEventListener("click", () => {
            // Get the target from the "data-target" attribute
            const target = el.dataset.target;
            const $target = document.getElementById(target);

            // Toggle the "is-active" class on both the "navbar-burger" and the "navbar-menu"
            el.classList.toggle("is-active");
            $target.classList.toggle("is-active");
          });
        });
      });

      function setLang(lang) {
        sessionStorage.setItem("lang", lang);
        window.location.reload();
      }
    </script>
    <script src="./bootstrap.js"></script>
  </body>
</html>
